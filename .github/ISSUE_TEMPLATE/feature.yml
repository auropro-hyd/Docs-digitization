name: ✨ Feature / improvement
description: Propose new behaviour or a meaningful enhancement.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        For anything bigger than a one-file change, please consider
        the [Spec-Kit workflow](../../specs/) — open a spec dir
        first rather than going straight to PR.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's the user-visible pain point? Quote the operator / pharmacist / reviewer's words if applicable.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        What you want to build, briefly. If you have a spec dir or PR draft, link it.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other paths you thought about and why you didn't pick them.

  - type: textarea
    id: success
    attributes:
      label: Success criteria
      description: How will we know this worked? Same shape as the SC- entries in spec.md files.
      placeholder: |
        - SC-001: ...
        - SC-002: ...

  - type: dropdown
    id: priority
    attributes:
      label: Priority hint
      options:
        - "P1 — gates a customer commitment"
        - "P2 — improves quality / closes a known issue"
        - "P3 — nice to have"
      default: 1
