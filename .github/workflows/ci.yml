name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs on the same PR when a new push lands so
# we don't pile up redundant green-but-stale jobs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  # Path-filter sentinel: detect whether the PR touches backend or
  # frontend code. Downstream jobs keep their original names
  # ("Backend (pytest)" / "Frontend (tsc + lint + build)") so the
  # required-status-check rule on `main` keeps matching, but their
  # heavy steps are gated behind these outputs. Docs-only PRs short-
  # circuit to a green check in ~30s.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend:
    name: Backend (pytest)
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - name: Skip notice (no backend changes)
        if: needs.changes.outputs.backend != 'true'
        run: echo "No backend/** changes detected — skipping heavy steps."

      - name: Install native deps for WeasyPrint
        # WeasyPrint (Spec 008 PDF renderer) needs pango / cairo /
        # gobject; without these the renderer-tests skip and the
        # report-export integration tests fall back to HTML. We
        # install on the runner so the full backend suite stays
        # green here.
        if: needs.changes.outputs.backend == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libcairo2 \
            libgdk-pixbuf-2.0-0

      - uses: actions/setup-python@v6
        if: needs.changes.outputs.backend == 'true'
        with:
          python-version: '3.13'
          cache: pip

      - name: Install Python deps
        # The repo uses pyproject.toml with optional [dev] deps for
        # the test stack (pytest, pyright, ruff). Install in
        # editable mode so import paths resolve as in dev.
        if: needs.changes.outputs.backend == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        if: needs.changes.outputs.backend == 'true'
        env:
          AT_ENV: test
        run: pytest -q --tb=short

  frontend:
    name: Frontend (tsc + lint + build)
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Skip notice (no frontend changes)
        if: needs.changes.outputs.frontend != 'true'
        run: echo "No frontend/** changes detected — skipping heavy steps."

      - uses: actions/setup-node@v6
        if: needs.changes.outputs.frontend == 'true'
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        if: needs.changes.outputs.frontend == 'true'
        run: npm ci

      - name: Type-check
        if: needs.changes.outputs.frontend == 'true'
        run: npx tsc --noEmit

      - name: Lint
        if: needs.changes.outputs.frontend == 'true'
        run: npx next lint

      - name: Build
        # Catches issues that tsc + lint miss (e.g. missing env
        # vars at static-route generation time, broken dynamic
        # imports). Kept in CI even though it duplicates some
        # type-check work because it's the gate that previously
        # would have caught the empty-img.src placeholder bug.
        if: needs.changes.outputs.frontend == 'true'
        run: npx next build
