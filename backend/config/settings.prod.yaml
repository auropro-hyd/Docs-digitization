app_name: "Auto Transcription"
debug: false

pipeline:
  mode: azure_di

# Disconnected container endpoint (override via AT_AZURE_DI__ENDPOINT env var)
# docker run -p 5000:5000 -e Eula=accept -e Billing=<billing-endpoint> -e ApiKey=<key> \
#   mcr.microsoft.com/azure-cognitive-services/form-recognizer/layout-3.1
azure_di:
  endpoint: "http://localhost:5000"
  features:
    - barcodes
    - keyValuePairs
    - ocrHighResolution
    - styleFont
    - languages
  feature_profiles:
    default: [barcodes, keyValuePairs, ocrHighResolution, styleFont, languages]
    bpr_core: [barcodes, keyValuePairs, ocrHighResolution, styleFont, languages, formulas]
    manufacturing_checklists: [barcodes, keyValuePairs, ocrHighResolution, styleFont, languages]
    instrument_data_reports: [barcodes, keyValuePairs, ocrHighResolution, styleFont, languages, formulas]
  quality_gate_enabled: true
  quality_gate_block_on_critical: false
  quality_gate_sample_pages: 3
  query_fields_enabled: true
  canary_enabled: true
  canary_query_fields_percent: 10
  rollback_min_quality_f1_delta: -0.005
  rollback_max_latency_ms_delta: 80.0
  rollback_max_cost_usd_delta: 0.01
  custom_model_enabled: false
  custom_model_shadow_enabled: true

# Marker settings (active when pipeline.mode = marker_docling)
marker:
  use_llm: true
  paginate_output: true
  extract_images: true
  ollama_base_url: "http://localhost:11434"
  ollama_model: "gemma2:9b"

# On-prem LLM
llm:
  provider: ollama
  base_url: "http://localhost:11434"
  model: "gemma2:9b"

database:
  url: "postgresql+asyncpg://postgres:postgres@db-server:5432/autotranscription"
  sync_url: "postgresql://postgres:postgres@db-server:5432/autotranscription"
  echo: false

storage:
  backend: filesystem
  base_path: "/data/documents"

hitl:
  auto_approve_threshold: 0.9
  review_threshold: 0.7
