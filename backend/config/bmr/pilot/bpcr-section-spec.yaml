# BPCR Section Spec — pilot
#
# Section IDs aligned to backend/app/compliance/rules/document_profiles.yaml
# (the authoritative `batch_record.expected_sections` list, 13 entries).
# Aliases are real BPCR header text variants we've seen on pilot docs;
# add to them whenever a real BPCR introduces a phrasing the detector
# misses. The detector falls back to alias matching when the regex
# misses, with lower confidence (see _CONF_ALIAS in bpcr_section_detect).
#
# Bump `spec_version` whenever this file changes meaning. Append to
# bpcr-section-spec.CHANGELOG.md alongside every edit.
spec_version: "1.2.0-pilot"

sections:
  - section_id: cover_page
    display_name: "Cover Page"
    aliases:
      - "Title Page"
      - "Front Page"
      - "Batch Production and Control Record"
    regex:
      - "^\\s*Batch\\s+Production\\s+and\\s+Control\\s+Record\\b"
      - "^\\s*BPCR\\s+Cover\\b"
      - "^\\s*COVER\\s+PAGE\\b"
    bands: [top_of_page]

  - section_id: revision_summary
    display_name: "Revision Summary"
    aliases:
      - "Revision History"
      - "Change History"
      - "Document Revisions"
      - "Amendment Log"
    bands: [top_of_page, top_of_table]

  - section_id: material_dispensing
    display_name: "Raw Material Weighing and Dispensing"
    aliases:
      - "Raw Material Weighing"
      - "Material Dispensing"
      - "Dispensing"
      - "Dispensing Record"
      - "Weighing Log"
      - "Raw Material Dispensing"
      - "List of Raw Materials and Weighing Details"
      - "Raw Material Weighing Details"
    bands: [top_of_page, top_of_table]

  - section_id: equipment_list
    display_name: "Equipment List"
    aliases:
      - "List of Major Equipments"
      - "Equipment and SOP Details"
      - "Equipment Details"
      - "Major Equipment"
    bands: [top_of_page, top_of_table]

  - section_id: manufacturing_operations
    display_name: "Manufacturing Operations"
    aliases:
      - "Process Operations"
      - "Manufacturing Operation Log"
      - "Manufacturing Log"
      - "Operation Sheet"
      - "Manufacturing Instructions"
      - "Production Operations"
    bands: [top_of_page, top_of_table]

  - section_id: sifting_record
    display_name: "Sifting Record"
    aliases:
      - "Sieving Record"
      - "Sifter Operation"
      - "Sifting Log"
    bands: [top_of_page, top_of_table]

  - section_id: pin_milling_mixing
    display_name: "Pin Milling / Mixing"
    aliases:
      - "Pin Mill Operation"
      - "Pin Milling"
      - "Mixing Operation"
      - "Pin Mill / Mixing"
    bands: [top_of_page, top_of_table]

  - section_id: micronization
    display_name: "Micronization"
    aliases:
      - "Micronisation"
      - "Micronizer Operation"
      - "Particle Size Reduction"
    bands: [top_of_page, top_of_table]

  - section_id: co_mill_operation
    display_name: "Co-Mill Operation"
    aliases:
      - "Co Mill"
      - "Co-Mill"
      - "Comill Operation"
      - "Co-Milling Record"
    bands: [top_of_page, top_of_table]

  - section_id: metal_detection
    display_name: "Metal Detection"
    aliases:
      - "Metal Detector Operation"
      - "Metal Detector Check"
      - "Metal Detector Log"
    bands: [top_of_page, top_of_table]

  - section_id: yield_calculation
    display_name: "Yield Calculation"
    aliases:
      - "Yield Reconciliation"
      - "Process Yield"
      - "Yield Computation"
      - "Final Yield"
      # v1.2.0: real-doc variants seen on the Apitoria BPCR (2026-04-30).
      - "Yield Details"
      - "Yield Summary"
    bands: [top_of_page, top_of_table, mid_page]
    requires_emphasis_for_mid_page: true

  - section_id: cleaning_log
    display_name: "Cleaning Log"
    aliases:
      - "Equipment Cleaning Record"
      - "Cleaning Record"
      - "Cleaning Verification"
      - "Post-Production Cleaning"
      # v1.2.0: real-doc variants — the Apitoria BPCR uses
      # "EQUIPMENT CLEANING DETAILS"; other pilot docs use the
      # plain "Cleaning Details" without the equipment qualifier.
      - "Equipment Cleaning Details"
      - "Cleaning Details"
    bands: [top_of_page, top_of_table]

  - section_id: deviation
    display_name: "Deviation Record"
    aliases:
      - "Deviation Note"
      - "Deviation Log"
      - "Deviation Report"
      - "Process Deviation"
      # v1.2.0: real BPCRs phrase the deviation section as
      # "DESCRIPTION OF DEVIATIONS OBSERVED DURING BATCH PROCESSING";
      # "Deviations Observed" / "Description of Deviations" cover that
      # plus the common shorthand variants.
      - "Description of Deviations"
      - "Deviations Observed"
      - "Deviations Recorded During"
    bands: [top_of_page, top_of_table]
