app_name: "Auto Transcription"
debug: true

pipeline:
  mode: azure_di

# Azure DI features to request (endpoint + key come from .env)
azure_di:
  features:
    - barcodes
    - keyValuePairs

# Marker settings (active when pipeline.mode = marker_docling)
marker:
  use_llm: true
  paginate_output: true
  extract_images: true
  ollama_base_url: "http://localhost:11434"
  ollama_model: "gemma2:9b"

# LLM for compliance agents and marker_docling processors
llm:
  provider: ollama
  base_url: "http://localhost:11434"
  model: "gemma2:9b"

database:
  url: "postgresql+asyncpg://postgres:postgres@localhost:5432/autotranscription"
  sync_url: "postgresql://postgres:postgres@localhost:5432/autotranscription"
  echo: true

storage:
  backend: filesystem
  base_path: "./data/documents"

hitl:
  auto_approve_threshold: 0.9
  review_threshold: 0.7
  batch_review_enabled: true
