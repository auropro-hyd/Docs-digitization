app_name: "Auto Transcription"
debug: false

pipeline:
  mode: azure_di

# Azure DI features (endpoint + key from env vars)
azure_di:
  features:
    - barcodes
    - keyValuePairs

# Azure OpenAI for staging (credentials from env vars)
llm:
  provider: azure_openai

database:
  echo: false

storage:
  backend: azure_blob

hitl:
  auto_approve_threshold: 0.9
  review_threshold: 0.7
