app_name: "Auto Transcription"
debug: false

ocr:
  primary_engine: marker
  secondary_engine: azure_di
  quality_scorer: docling

azure_di:
  endpoint: "${AZURE_DI_ENDPOINT}"
  api_key: "${AZURE_DI_API_KEY}"

llm:
  provider: ollama
  base_url: "http://ollama:11434"
  model: "gemma2:9b"

database:
  url: "${AZURE_PG_CONNECTION_STRING}"
  echo: false

storage:
  backend: azure_blob
  azure_connection_string: "${AZURE_STORAGE_CONNECTION_STRING}"
  azure_container: "documents"

hitl:
  auto_approve_threshold: 0.9
  review_threshold: 0.7
