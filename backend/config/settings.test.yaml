app_name: "Auto Transcription Test"
debug: true

pipeline:
  mode: azure_di

azure_di:
  features:
    - barcodes
    - keyValuePairs
    - ocrHighResolution
    - styleFont
    - languages
  feature_profiles:
    default: [barcodes, keyValuePairs, ocrHighResolution, styleFont, languages]
    bpr_core: [barcodes, keyValuePairs, ocrHighResolution, styleFont, languages, formulas]
    manufacturing_checklists: [barcodes, keyValuePairs, ocrHighResolution, styleFont, languages]
    instrument_data_reports: [barcodes, keyValuePairs, ocrHighResolution, styleFont, languages, formulas]
  quality_gate_enabled: true
  quality_gate_block_on_critical: false
  quality_gate_sample_pages: 2
  query_fields_enabled: true

llm:
  provider: ollama
  base_url: "http://localhost:11434"
  model: "gemma2:2b"

database:
  url: "postgresql+asyncpg://postgres:postgres@localhost:5432/autotranscription_test"
  sync_url: "postgresql://postgres:postgres@localhost:5432/autotranscription_test"
  echo: true

storage:
  backend: filesystem
  base_path: "./data/test_documents"
