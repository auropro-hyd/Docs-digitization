# ═══════════════════════════════════════════════════════════════
#  ALCOA++ Rule Configuration — REFERENCE EXEMPLARS ONLY
#
#  Two of the three evaluation patterns Akhilesh's rule-author skill
#  needs to repopulate against the new document_profiles.yaml:
#
#    Rule 1 → SAME-PAGE INDIVIDUAL
#    Rule 2 → AGGREGATED WITHIN A SINGLE DOCUMENT
#
#  The third pattern (CROSS-DOCUMENT) lives in reconciliation_rules.yaml.
#
#  All sample / page / section names below resolve in the NEW
#  document_profiles.yaml taxonomy (batch_record + 9-doc-type model).
#
#  Historical rule overlays are preserved in alcoa_rules.archived.yaml.
# ═══════════════════════════════════════════════════════════════

defaults:
  scope: page
  severity: observation
  evaluation_mode: llm
  applicable_document_types: [batch_record]
  excluded_document_types: []
  applicable_page_types: []
  applicable_section_types: []
  cross_section_requirements: []
  keywords: []
  pass_criteria: ""
  skip_conditions: []
  cannot_evaluate_reason: ""
  requires_external_data: []
  notes: ""

categories:

  # ── Attributable ──────────────────────────────────────────────
  attributable:
    severity: major
    applicable_section_types: [manufacturing_operations]
    rules:
      1:
        # SAME-PAGE INDIVIDUAL pattern.
        # Akhilesh: "is the entry there or not, are there any strike-offs"
        keywords: ["done by", "checked by", "signature", "initial", "date", "time"]
        pass_criteria: |
          Every "Done by", "Checked by", signature/initial column, time
          column, and date column on this page is populated with a
          legible value. Dash-only ("---", "—") cells are acceptable
          ONLY where a manifest column is genuinely not applicable;
          otherwise an empty / blank / strikethrough row is non-compliant.
        skip_conditions:
          - "page is a cover_page or revision_summary (no operator entries expected)"
        notes: |
          Reference exemplar for the SAME-PAGE INDIVIDUAL pattern.
          Use this as the template for any rule that returns a verdict
          per page based on field presence / completeness.

  # ── Contemporaneous ──────────────────────────────────────────
  contemporaneous:
    severity: major
    applicable_section_types: [manufacturing_operations]
    rules:
      2:
        # AGGREGATED-WITHIN-A-DOCUMENT pattern (single page).
        # Akhilesh: "start time of first operation matches all entries,
        #            reconcile with last end time"
        keywords: ["start time", "end time", "completed at", "performed at"]
        pass_criteria: |
          Within this page:
            (a) All row-level timestamps are monotonically non-decreasing
                from top to bottom (no out-of-order entries).
            (b) If a page-level "Start Time" header exists, it is ≤ the
                earliest row time on the page.
            (c) If a page-level "End Time" header exists, it is ≥ the
                latest row time on the page.
        notes: |
          Reference exemplar for the AGGREGATED-WITHIN-A-DOCUMENT
          pattern. The rule's verdict depends on a relationship
          between multiple values present on the same page (page-level
          aggregation, not a per-row check).
