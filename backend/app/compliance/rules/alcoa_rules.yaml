# ═══════════════════════════════════════════════════════════════
#  ALCOA++ Rule Configuration
#  Separated from rule text (alcoa_rules.md) for easy tuning.
#  Keys: categories.<slug>.rules.<number>
#  Cascade: defaults -> category-level -> per-rule overrides
# ═══════════════════════════════════════════════════════════════

defaults:
  scope: page
  severity: observation
  evaluation_mode: llm
  applicable_document_types: [batch_record]
  excluded_document_types: []
  applicable_page_types: []
  applicable_section_types: []
  cross_section_requirements: []
  keywords: []
  pass_criteria: ""
  skip_conditions: []
  cannot_evaluate_reason: ""
  requires_external_data: []
  notes: ""

categories:

  # ── Attributable (rules 1-14) ─────────────────────────────
  attributable:
    severity: major
    applicable_page_types: [form]
    rules:
      1:
        applicable_section_types: [manufacturing_operations, cleaning_log, qc_report]
        pass_criteria: >
          Any text in a "Done by" or "Checked by" column counts as valid
          identification — this includes initials, names, abbreviations,
          employee codes, or garbled OCR of handwritten text (e.g., 'Noga',
          'N088', 'K', 'NOOR', 'staten'). OCR often misreads handwriting,
          so ANY non-empty text in these columns should be accepted as a
          valid handwritten entry. A date (even with OCR errors like '2015'
          instead of '2025') accompanying it counts as present.
        skip_conditions:
          - "Row contains only dashes (-/---/—) in all cells -> not_applicable"
          - "Page has no tabular data with signature/identity columns -> not_applicable"
        keywords: [done by, checked by, signature, initial, performed by]

      2:
        applicable_page_types: [form, content]
        applicable_section_types: [electronic_records, automated_systems]
        pass_criteria: >
          For electronically generated pages/records, there should be
          traceable operator identity evidence such as "Printed By",
          user/operator ID, electronic signature, or equivalent footer metadata.
          Presence of print metadata with operator and timestamp satisfies this.
        skip_conditions:
          - "Page contains no electronic/system-generated indicators (e.g., Printed By, system footer) -> not_applicable"
        keywords: [login, electronic signature, operator id, user id, system]

      3:
        evaluation_mode: cannot_evaluate
        cannot_evaluate_reason: "Training matrix not available for cross-reference"
        requires_external_data: [training_matrix]

      4:
        evaluation_mode: cannot_evaluate
        cannot_evaluate_reason: "Approved signature log not available for cross-reference"
        requires_external_data: [signature_log]

      5:
        applicable_section_types: [manufacturing_operations]
        pass_criteria: >
          Both "Done by" and "Checked by" columns must contain text for
          critical manufacturing steps. ANY text counts — including garbled
          OCR of handwritten signatures (e.g., 'Noga', 'N088', 'K', 'NOOR').
          A step is critical if it involves weighing, charging, sampling,
          or quality-impacting actions. Rows where ALL cells contain only
          dashes (-/—) indicate the step was not performed and are compliant.
        skip_conditions:
          - "Page has no Done by / Checked by columns -> not_applicable"
          - "Row contains only dashes (-/---/—) in all cells -> not_applicable"
        keywords: [done by, checked by]

      6:
        applicable_page_types: [form, content]
        applicable_section_types: []
        pass_criteria: >
          Corrections must show a single-line strikethrough of the original
          entry (original still readable), accompanied by the corrected value,
          initials of the corrector, and the date of correction.
          NOTE: OCR cannot reliably detect strikethroughs in scanned
          documents. Strikethrough text may appear as normal text, or as
          garbled characters. Do NOT assume non-compliance just because
          OCR text looks unusual near a correction. Only flag if there is
          clear evidence of an uncorrected overwrite (e.g., two different
          values in the same field with no correction annotation).
        skip_conditions:
          - "Page contains no visible corrections, strikethroughs, or amendments -> not_applicable"
        keywords: [correction, strikethrough, amended, corrected, overwritten]

      7:
        applicable_page_types: [printed, form, content]
        applicable_section_types: []
        pass_criteria: >
          Footer or header contains text like "Printed by [name], [date/time]"
          or "Electronically issued, no signature required, printed by [name],
          [date]". Any printed output must show who generated it and when.
        skip_conditions:
          - "Page is not a printout or system-generated output -> not_applicable"
        keywords: [printed by, electronically issued, generated by, printout]

      8:
        applicable_section_types: [cleaning_log, equipment_usage_log, line_clearance]
        pass_criteria: >
          Each cleaning or usage log entry must have operator identification
          (name, initials, or employee code) alongside the activity record.
        skip_conditions:
          - "Page is not a cleaning or usage log -> not_applicable"
        keywords: [cleaning, usage log, line clearance, cleaned by, washed]

      9:
        applicable_page_types: [form, content, printed]
        applicable_section_types: [raw_data, chromatogram, balance_printout, em_report]
        pass_criteria: >
          Raw data printouts (balance tickets, EM reports, chromatograms) must
          include: operator name or ID, date/time, and equipment identification.
        skip_conditions:
          - "Page contains no raw data printouts -> not_applicable"
        keywords: [chromatogram, balance, printout, spectrum, raw data, EM report]

      10:
        scope: document
        applicable_page_types: []
        notes: >
          Evaluates whether the document references access controls or audit
          trails. Full verification requires system access.

      11:
        applicable_page_types: [form, content]
        applicable_section_types: [electronic_records, automated_systems]
        pass_criteria: >
          If the page indicates it is system-generated, the footer/content
          should identify who generated or printed it (e.g., Printed By and
          timestamp metadata).
        skip_conditions:
          - "Page contains no automated or system-driven processes -> not_applicable"
        keywords: [automated, system, process initiated, auto, PLC]

      12:
        applicable_section_types: [deviation, oos_investigation, oot_investigation]
        pass_criteria: >
          Deviation/OOS/OOT records should include completion evidence:
          completion date and required role sign-offs (manufacturing, QC, QA
          as applicable by template). If the section exists but required
          completion/signature fields are empty, mark non-compliant.
        skip_conditions:
          - "Page contains no deviation or OOS/OOT investigation content -> not_applicable"
        keywords: [deviation, OOS, OOT, investigation, root cause, CAPA]

      13:
        evaluation_mode: cannot_evaluate
        cannot_evaluate_reason: "Personnel qualification and training records not available for cross-reference"
        requires_external_data: [training_records, qualification_records]

      14:
        evaluation_mode: cannot_evaluate
        cannot_evaluate_reason: "Signature log not available to verify currency and completeness"
        requires_external_data: [signature_log]

  # ── Legible (rules 15-24) ─────────────────────────────────
  legible:
    severity: minor
    applicable_page_types: [form, content]
    rules:
      15:
        pass_criteria: >
          Evaluate whether the page structure and printed text are clear.
          IMPORTANT: Garbled or unusual text in handwritten fields (Done by,
          Checked by, signature columns) is caused by OCR struggling with
          handwriting — NOT by the original entries being illegible. Do NOT
          flag OCR artifacts as overwritten or unclear entries. Only flag
          non-compliant if printed/typed text is genuinely jumbled or if
          entire sections of the page are missing/unreadable.
        skip_conditions:
          - "If the only 'unclear' text is in handwritten signature/date columns, this is OCR noise -> compliant"

      16:
        pass_criteria: >
          This rule requires VISUAL inspection of the physical document.
          OCR text alone CANNOT determine whether smudges, fading, or pencil
          marks exist. Garbled OCR text (e.g., '30/09/20#', '3cleader') is
          an OCR artifact from reading handwriting, NOT evidence of smudges
          or document damage. Mark compliant unless the page appears to be
          mostly blank or structurally damaged (e.g., entire columns missing).
        notes: >
          Visual defects require VLM (Vision-Language Model) for reliable
          detection. LLM evaluating OCR text cannot assess physical quality.

      17:
        pass_criteria: >
          This rule requires VISUAL inspection. OCR cannot detect sticky
          notes, pencil marks, or ink colors. Garbled handwritten text
          (e.g., 'staten', 'Noga') is NOT evidence of unapproved inks —
          it is OCR's attempt at reading normal handwriting. Mark compliant
          unless there is explicit textual evidence of temporary annotations
          (e.g., '[DRAFT]', '[PENCIL NOTE]', '[POST-IT]').
        notes: "VLM recommended. LLM should default to compliant for this rule."

      18:
        skip_conditions:
          - "Page has no attachments, labels, or affixed items -> not_applicable"
        keywords: [attachment, label, sticker, affixed, pasted]

      19:
        applicable_page_types: [form, content, printed, cover, index]
        pass_criteria: >
          Page numbering must be present. Look for "Page X of Y", "Page: X",
          "X/Y", or similar patterns in headers or footers. These are often
          in the first or last few lines of the OCR content. Even partial
          OCR reads like "Page 6 of 97" or "Page : 6" count as valid
          page numbering. Do NOT flag missing page numbers if the header
          or footer contains any recognizable page reference.
        keywords: [page, of]

      20:
        skip_conditions:
          - "Page has no barcodes or labels -> not_applicable"
        keywords: [barcode, label, QR, scan]

      21:
        applicable_page_types: [printed]
        skip_conditions:
          - "Page is not a printed copy or printout -> not_applicable"

      22:
        pass_criteria: >
          This rule requires VISUAL inspection — OCR text alone cannot
          determine ink color or whether entries are in pencil vs pen.
          Garbled text from handwritten fields does NOT indicate pencil use.
          Mark compliant unless there is explicit textual evidence such as
          '[PENCIL]' or metadata indicating non-permanent ink.
        skip_conditions:
          - "Page has no handwritten content (handwritten_count = 0) -> not_applicable"
          - "OCR cannot determine ink type — default to compliant"

      23:
        applicable_page_types: []
        applicable_section_types: [electronic_records]
        skip_conditions:
          - "Page is from a paper/scanned document, not an electronic record -> not_applicable"

      24:
        skip_conditions:
          - "Page contains no charts, graphs, or figures -> not_applicable"
        keywords: [chart, graph, figure, plot, diagram, scale]

  # ── Contemporaneous (rules 25-33) ─────────────────────────
  contemporaneous:
    severity: major
    applicable_page_types: [form]
    rules:
      25:
        applicable_section_types: [manufacturing_operations]
        pass_criteria: >
          Timestamps for each activity entry should be close to the expected
          execution time. Entries recorded hours after the event or in bulk
          at shift end are non-compliant.
        keywords: [time, date, performed, completed, hr, min]

      26:
        applicable_section_types: [manufacturing_operations]
        pass_criteria: >
          Look for clusters of entries with identical or near-identical
          timestamps that span activities expected to take significant time.
          This pattern suggests end-of-shift bulk recording.
        keywords: [time, date, shift]

      27:
        pass_criteria: >
          Timestamps must progress logically (later steps have later times).
          Duration values must be plausible for the described activity.
          IMPORTANT: OCR frequently misreads handwritten dates — common
          errors include wrong year digits (2015 instead of 2025, 205 or
          20# instead of 2025), swapped day/month digits, and truncated
          numbers. These are OCR artifacts, NOT evidence of unrealistic
          timestamps. If a date looks implausible (e.g., year 2015 when
          surrounding dates are 2025), assume it is an OCR misread and
          treat the entry as compliant.
        keywords: [time, hr, min, duration, from, to]

      28:
        evaluation_mode: cannot_evaluate
        cannot_evaluate_reason: "System clock synchronization requires access to the physical system or IT records"
        requires_external_data: [system_clock_records]

      29:
        pass_criteria: >
          If two or more entries share the exact same timestamp, there must
          be a documented justification. Brief sequential operations
          (e.g., inspect then charge) sharing a timestamp are acceptable.
          Note: OCR may misread handwritten times, making separate times
          appear identical. If timestamps look suspicious, consider OCR
          error as a possibility and err toward compliant.
        keywords: [time, timestamp, hr, min]

      30:
        skip_conditions:
          - "Page contains no alarm or alert records -> not_applicable"
        keywords: [alarm, alert, acknowledged, warning]

      31:
        applicable_section_types: [manufacturing_operations]
        pass_criteria: >
          If a time gap of more than 2 hours exists between consecutive
          operations, there should be documented justification (hold time,
          equipment changeover, etc.).
        keywords: [time, duration, gap, hold]

      32:
        scope: document
        notes: >
          Cross-document timestamp consistency requires comparison across
          BMR, equipment logs, and HVAC records. Best evaluated as cross-page.

      33:
        pass_criteria: >
          Dates on completed activities must not be in the future relative
          to subsequent entries or the document completion date.
          CRITICAL CONTEXT: BPCR (Batch Production and Control Record)
          templates are PRINTED before manufacturing begins. The template
          may show a print/effective date (e.g., 18-Sep-2025) while actual
          manufacturing entries are dated later (Sep/Oct 2025). This is
          NORMAL workflow, NOT post-dating. Only flag post-dating if an
          activity entry's date is LATER than a subsequent step's date in
          the same process sequence.
          Also: OCR frequently misreads handwritten year digits (e.g.,
          '2015' instead of '2025'). Do not flag these as date anomalies.
        keywords: [date, time]

  # ── Original (rules 34-41) ────────────────────────────────
  original:
    severity: major
    scope: document
    applicable_page_types: []
    rules:
      34:
        pass_criteria: >
          The document must appear to be the original record, not a
          transcribed copy. Look for "ORIGINAL" stamps or controlled
          copy markings.

      35:
        skip_conditions:
          - "If the page is clearly part of an official BMR (has BPCR number, batch number, controlled header) -> not_applicable"
        keywords: [draft, convenience copy, for information only, uncontrolled]

      36:
        keywords: [controlled copy, document control, revision, copy number]

      37:
        applicable_section_types: [electronic_records, raw_data]
        pass_criteria: >
          For pages referencing electronic/system-captured data, there should
          be metadata suggesting original system provenance (system name,
          generated/printed timestamp, or comparable print metadata).
        skip_conditions:
          - "Page is a paper record with no electronic data references -> not_applicable"

      38:
        scope: page
        applicable_page_types: [form]
        pass_criteria: >
          If data fields are blank with annotation like "data lost" or
          "reconstructed," this indicates re-creation and is non-compliant
          unless a deviation is referenced.
        keywords: [missing, reconstructed, re-created, deviation, data lost]

      39:
        applicable_section_types: [electronic_records]
        skip_conditions:
          - "No electronic signature or audit trail references on page -> not_applicable"

      40:
        notes: "Difficult to assess from OCR alone; look for 'copy' watermarks or duplicate indicators."

      41:
        scope: page
        applicable_section_types: [chromatogram, raw_data, qc_report]
        skip_conditions:
          - "Page contains no chromatograms or spectra -> not_applicable"
        keywords: [chromatogram, spectrum, spectra, HPLC, GC, IR, UV]

  # ── Accurate (rules 42-51) ────────────────────────────────
  accurate:
    severity: critical
    applicable_page_types: [form]
    rules:
      42:
        pass_criteria: >
          Calculations on the page must have a "Checked by" or "Verified by"
          countersignature. The calculated values should be arithmetically
          plausible given the input values shown.
        keywords: [calculation, yield, weight, total, result, formula]
        applicable_section_types: [manufacturing_operations, qc_report, yield_calculation]

      43:
        pass_criteria: >
          Recorded weights, parameters, and test results must fall within
          any stated acceptance ranges or specification limits shown on the
          same page.
        keywords: [weight, parameter, IPC, QC, result, range, limit, specification]
        applicable_section_types: [manufacturing_operations, qc_report, in_process_report]

      44:
        keywords: [temperature, humidity, pressure, environmental, sampling, monitor]
        applicable_section_types: [environmental_monitoring, sampling, manufacturing_operations]
        skip_conditions:
          - "Page has no environmental or sampling data -> not_applicable"

      45:
        keywords: [equipment, setting, parameter, RPM, temperature, pressure, speed]
        applicable_section_types: [manufacturing_operations]
        skip_conditions:
          - "Page has no equipment settings or parameter recordings -> not_applicable"

      46:
        applicable_page_types: [form, content]
        pass_criteria: >
          Check for internal consistency: values referenced multiple times
          on the same page should match. Batch numbers, product names, and
          quantities should not contradict each other.
          IMPORTANT: OCR errors are NOT transcription errors by the
          operator. If a value appears inconsistent, check whether one
          instance could be an OCR misread of handwriting (e.g., date
          year '2015' vs '2025', garbled text in handwritten columns).
          OCR-caused discrepancies should not be flagged as non-compliant.

      47:
        scope: document
        cross_section_requirements:
          - material_usage_vs_dispensing
        keywords: [material, balance, quantity, yield, weight, reconciliation]
        applicable_section_types: [manufacturing_operations, material_dispensing]
        notes: "Best evaluated as cross-page to compare across process stages."

      48:
        keywords: [potency, correction factor, API, assay, purity]
        applicable_section_types: [manufacturing_operations, qc_report]
        skip_conditions:
          - "Page has no potency or correction factor data -> not_applicable"

      49:
        keywords: [mg, kg, mL, L, unit, conversion, gram, liter]
        skip_conditions:
          - "Page has no unit-based calculations -> not_applicable"

      50:
        scope: document
        cross_section_requirements:
          - qc_vs_coa_consistency
        keywords: [QC, CoA, certificate, analysis, test result]
        applicable_section_types: [qc_report, certificate_of_analysis]
        notes: "Requires cross-page comparison between QC section and CoA."

      51:
        keywords: [dilution, factor, calculation, concentration]
        applicable_section_types: [qc_report, in_process_report]
        skip_conditions:
          - "Page has no dilution or concentration calculations -> not_applicable"

  # ── Complete (rules 52-62) ────────────────────────────────
  complete:
    severity: major
    rules:
      52:
        applicable_page_types: [form]
        pass_criteria: >
          Every field on the form page must be filled in. The following
          are ALL considered valid (non-empty) annotations:
          - "N/A", "NA", "N.A.", "Not Applicable" (with or without initials)
          - Single dash (-), multiple dashes (---/----), em-dash (—)
          - Any text, numbers, or codes (including garbled OCR of handwriting)
          - "Refer step X", "See page X", or similar cross-references
          Only flag a field as blank if it is truly EMPTY with no text,
          no dash, no annotation whatsoever. Dashes in form fields mean
          "not applicable" or "step not performed" — they are legitimate
          GMP annotations and must NOT be treated as blank.
        skip_conditions:
          - "Page has no form fields or tabular data -> not_applicable"

      53:
        applicable_page_types: [form]
        pass_criteria: >
          All signature lines (Done by, Checked by, Approved by, Verified by)
          must have entries. ANY text in these columns counts as a valid
          entry — including garbled OCR of handwritten signatures (e.g.,
          'Noga', 'N088', 'staten', 'K', '3cleader'). OCR reads handwriting
          imperfectly; the presence of any text means someone signed.
          Date fields with OCR errors (e.g., '30/09/2015' or '02/10/205')
          count as filled — these are OCR misreads of handwritten dates.
          Dashes (-/—/---) in signature or date columns mean the step was
          not performed and are valid annotations, NOT blank fields.
          Equipment ID fields must not be blank (but may contain OCR noise).
        keywords: [signature, date, equipment, done by, checked by, approved by]

      54:
        scope: document
        keywords: [attachment, annexure, appendix, refer, enclosed]

      55:
        scope: document
        keywords: [deviation, OOS, OOT, reference, linked]

      56:
        applicable_page_types: [form]
        keywords: [sample, test, IPC, QC, analysis]
        applicable_section_types: [manufacturing_operations, qc_report]

      57:
        scope: document
        pass_criteria: >
          Page numbering should be sequential with no gaps. "Page X of Y"
          format should have Y matching the total page count.
        keywords: [page, of]

      58:
        applicable_page_types: [form]
        keywords: [hold time, hold-time, intermediate, storage, stability]
        applicable_section_types: [manufacturing_operations]
        skip_conditions:
          - "Page has no hold-time or intermediate storage references -> not_applicable"

      59:
        scope: document
        keywords: [change control, CAPA, change request]

      60:
        scope: document
        keywords: [analytical report, IPC, finished product, certificate]

      61:
        applicable_page_types: [form]
        keywords: [transfer, return, material, dispatch, receipt]
        applicable_section_types: [manufacturing_operations, material_dispensing]
        skip_conditions:
          - "Page has no material transfer or return records -> not_applicable"

      62:
        applicable_page_types: [form]
        keywords: [retention, sample, withdrawal, reserve]
        applicable_section_types: [qc_report, retention_sample]
        skip_conditions:
          - "Page has no retention sample references -> not_applicable"

  # ── Consistent (rules 63-68) ──────────────────────────────
  consistent:
    severity: major
    scope: document
    applicable_page_types: []
    cross_section_requirements:
      - inter_section_consistency
    notes: >
      Consistency rules are cross-page by nature. They are evaluated at
      document scope and compared across sections. Per-page evaluation
      can only flag internal inconsistencies within a single page.
    rules:
      63:
        keywords: [date, time, logbook, equipment log]

      64:
        keywords: [quantity, yield, weight, stage]

      65:
        keywords: [material code, batch number, lot number]

      66:
        cross_section_requirements:
          - operation_vs_weighing_reconciliation
        keywords: [requisition, dispensing, material]

      67:
        keywords: [equipment ID, equipment, asset]

      68:
        keywords: [batch number, format, batch no]

  # ── Enduring (rules 69-75) ────────────────────────────────
  enduring:
    severity: minor
    scope: document
    applicable_page_types: []
    rules:
      69:
        pass_criteria: >
          Look for evidence of proper storage: controlled document stamps,
          archive references, or binding. Damaged or loose pages indicate
          non-compliance.

      70:
        notes: "Ink type verification is best done visually (VLM)."

      71:
        applicable_section_types: [electronic_records]
        skip_conditions:
          - "Document is purely paper-based with no electronic components -> not_applicable"

      72:
        pass_criteria: >
          Document should show evidence of binding (page numbers in sequence,
          no loose pages noted, binding marks visible).

      73:
        evaluation_mode: cannot_evaluate
        cannot_evaluate_reason: "Archive environmental conditions (temperature, humidity) require physical inspection"
        requires_external_data: [archive_monitoring_records]

      74:
        applicable_section_types: [electronic_records]
        evaluation_mode: cannot_evaluate
        cannot_evaluate_reason: "Electronic backup validation requires IT system access"
        requires_external_data: [backup_validation_records]

      75:
        evaluation_mode: cannot_evaluate
        cannot_evaluate_reason: "Retention period compliance requires regulatory reference and archive records"
        requires_external_data: [retention_policy, archive_records]

  # ── Available (rules 76-82) ───────────────────────────────
  available:
    severity: minor
    scope: document
    applicable_page_types: []
    rules:
      76:
        evaluation_mode: cannot_evaluate
        cannot_evaluate_reason: "Retrieval timeline verification requires archive system access"
        requires_external_data: [archive_system]

      77:
        evaluation_mode: cannot_evaluate
        cannot_evaluate_reason: "Archive index verification requires archive system access"
        requires_external_data: [archive_index]

      78:
        evaluation_mode: cannot_evaluate
        cannot_evaluate_reason: "Electronic backup accessibility requires IT system verification"
        requires_external_data: [backup_system]

      79:
        keywords: [cross-reference, refer, see also, attachment]
        pass_criteria: >
          Cross-referenced documents mentioned in the record should have
          clear identifiers (document numbers, revision numbers) that would
          allow retrieval.

      80:
        evaluation_mode: cannot_evaluate
        cannot_evaluate_reason: "Audit trail accessibility requires system access for verification"
        requires_external_data: [audit_trail_system]

      81:
        keywords: [SOP, specification, reference, procedure]
        pass_criteria: >
          Referenced SOPs and specifications should include document numbers
          and revision numbers, enabling retrieval during review.

      82:
        evaluation_mode: cannot_evaluate
        cannot_evaluate_reason: "Retrieval process testing requires archive system access"
        requires_external_data: [archive_system]
