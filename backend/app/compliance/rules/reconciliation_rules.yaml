# ═══════════════════════════════════════════════════════════════
#  Cross-Page / Cross-Document Reconciliation — REFERENCE EXEMPLAR
#
#  One rule, illustrating the CROSS-DOCUMENT evaluation pattern that
#  Akhilesh's rule-author skill needs to repopulate. References resolve
#  against the new document_profiles.yaml (batch_record +
#  raw_material_request).
#
#  The other two patterns live in alcoa_rules.yaml.
#  Historical overlays preserved in reconciliation_rules.archived.yaml.
# ═══════════════════════════════════════════════════════════════

defaults:
  scope: cross_page
  severity: observation
  evaluation_mode: llm
  applicable_document_types: [batch_record]
  excluded_document_types: []
  applicable_page_types: []
  applicable_section_types: []
  cross_section_requirements: []
  keywords: []
  pass_criteria: ""
  skip_conditions: []
  cannot_evaluate_reason: ""
  requires_external_data: []
  notes: ""

categories:

  # ── Material Reconciliation ───────────────────────────────────
  material_reconciliation:
    severity: major
    # The cross_section_requirements field tells the runtime which
    # sections must BOTH be present on the package before this rule
    # can evaluate. If either is missing the rule reports "cannot
    # evaluate" rather than failing.
    cross_section_requirements:
      - section_type: material_dispensing
        in_document_type: batch_record
      - section_type: material_request
        in_document_type: raw_material_request
    rules:
      1:
        # CROSS-DOCUMENT pattern.
        # Akhilesh: "if a step says we have used this raw material, then
        # in the dispensing record, whether there is an entry matching
        # with the quantity that is mentioned in the step or not."
        keywords:
          - "raw material"
          - "lot"
          - "batch"
          - "dispensed"
          - "issued"
          - "quantity"
        pass_criteria: |
          For every raw material referenced in the batch_record
          material_dispensing section there exists a matching entry in
          the raw_material_request material_request section, joined on:
            - material name (alias-normalised, case-insensitive)
            - lot / batch number (exact match)
          and the dispensed quantity is within ±0.5% of the requested
          quantity. Surface any (a) missing material, (b) lot mismatch,
          or (c) quantity drift outside tolerance as separate findings.
        notes: |
          Reference exemplar for the CROSS-DOCUMENT pattern. The
          verdict requires evidence from two sections in two different
          document types, joined on a stable entity key (material name
          + lot). When generating new cross-document rules, copy this
          shape and change the (source_section, target_section,
          join_keys, tolerance) tuple.
